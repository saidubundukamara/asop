<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover is required for env(safe-area-inset-*) to return
		     non-zero on iOS Safari; without it the bottom tab bar overlaps the
		     home indicator on notched/island devices. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="ADSAT Ops" />
		<link rel="manifest" href="/manifest.webmanifest" />
		<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png" />
		<link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
		<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
		<link
			rel="apple-touch-startup-image"
			href="/icons/apple-splash-1290x2796.png"
			media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3) and (orientation: portrait)"
		/>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
