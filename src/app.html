<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<!-- viewport-fit=cover is required for env(safe-area-inset-*) to return
		     non-zero on iOS Safari; without it the bottom tab bar overlaps the
		     home indicator on notched/island devices. -->
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="text-scale" content="scale" />
		<meta name="theme-color" content="#0a0a0a" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="ADSAT Ops" />
		<link rel="manifest" href="/manifest.webmanifest" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
